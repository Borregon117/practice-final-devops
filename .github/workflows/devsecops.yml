name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: 1. Escaneo de Secretos (Trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: 2. SCA - Auditoría de dependencias (npm audit)
        run: npm audit --audit-level=high

      - name: Build de la imagen del contenedor
        run: docker build -t api-inventario:latest .

      - name: 3. Seguridad de Contenedores (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-inventario:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
